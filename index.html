<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Piškvorky</h1>
        
        <div class="game-info">
            <p>Na tahu: <span id="current-player"></span></p>
        </div>
        
        <div class="gameboard" id="gameboard">
            <!-- Sem se vykreslí políčka -->
        </div>
        
        <div class="result" id="result"></div>
        
        <button id="restart-btn">Nová hra</button>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
